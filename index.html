<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>안심벨 – 생활 안심 현황</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

  <style>
    :root {
      --bg: #f0f4f8;
      --card: #ffffff;
      --text-main: #1a2332;
      --text-sub: #6b7a8d;
      --safe: #22c55e;
      --safe-bg: #dcfce7;
      --warn: #ef4444;
      --warn-bg: #fee2e2;
      --waiting: #f59e0b;
      --waiting-bg: #fef3c7;
      --idle: #cbd5e1;
      --idle-bg: #f1f5f9;
      --accent: #3b82f6;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text-main);
    }

    /* 헤더 */
    header {
      background: var(--card);
      padding: 20px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-title {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .header-title span { color: var(--accent); }

    .conn-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-sub);
      background: var(--idle-bg);
      padding: 6px 14px;
      border-radius: 999px;
    }

    .conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--idle);
      transition: background 0.4s;
    }

    .conn-dot.live { background: var(--safe); animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* 메인 */
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 28px 18px 60px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 요약 카드 */
    .summary {
      background: var(--card);
      border-radius: 20px;
      padding: 24px 28px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      box-shadow: var(--shadow);
    }

    .summary-item label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-sub);
      display: block;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .summary-item .val {
      font-size: 32px;
      font-weight: 900;
      line-height: 1;
    }

    .val.safe { color: var(--safe); }
    .val.warn { color: var(--warn); }
    .val.normal { color: var(--text-main); }

    /* 식사 카드 */
    .meal-card {
      background: var(--card);
      border-radius: 20px;
      padding: 22px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
      border-left: 5px solid var(--idle);
      transition: border-color 0.4s, box-shadow 0.4s;
      position: relative;
      overflow: hidden;
    }

    .meal-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .meal-card.status-waiting { border-color: var(--waiting); }
    .meal-card.status-waiting::before { background: var(--waiting-bg); opacity: 0.3; }

    .meal-card.status-done { border-color: var(--safe); }
    .meal-card.status-done::before { background: var(--safe-bg); opacity: 0.3; }

    .meal-card.status-timeout { border-color: var(--warn); box-shadow: 0 0 0 3px rgba(239,68,68,0.15), var(--shadow); }
    .meal-card.status-timeout::before { background: var(--warn-bg); opacity: 0.4; }

    .meal-info { position: relative; }

    .meal-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .meal-time {
      font-size: 13px;
      color: var(--text-sub);
      font-weight: 400;
    }

    /* 상태 배지 */
    .status-badge {
      position: relative;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 18px;
      border-radius: 999px;
      white-space: nowrap;
      transition: all 0.4s;
      background: var(--idle-bg);
      color: var(--text-sub);
    }

    .status-badge.done {
      background: var(--safe-bg);
      color: var(--safe);
    }

    .status-badge.waiting {
      background: var(--waiting-bg);
      color: var(--waiting);
      animation: blink-badge 1s infinite;
    }

    .status-badge.timeout {
      background: var(--warn-bg);
      color: var(--warn);
      animation: shake 0.5s ease infinite alternate;
    }

    @keyframes blink-badge {
      0%,100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      100% { transform: translateX(3px); }
    }

    /* 응급 배너 */
    .emergency-banner {
      display: none;
      background: var(--warn);
      color: #fff;
      border-radius: 16px;
      padding: 18px 24px;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      animation: emergency-flash 0.8s ease infinite alternate;
      box-shadow: 0 4px 20px rgba(239,68,68,0.4);
    }

    .emergency-banner.show { display: block; }

    @keyframes emergency-flash {
      0% { background: #ef4444; box-shadow: 0 4px 20px rgba(239,68,68,0.4); }
      100% { background: #b91c1c; box-shadow: 0 4px 30px rgba(239,68,68,0.7); }
    }

    /* 최근 기록 */
    .log-section h2 {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-sub);
      margin-bottom: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .log-list {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .log-item {
      padding: 14px 20px;
      font-size: 14px;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeIn 0.4s ease;
    }

    .log-item:last-child { border-bottom: none; }
    .log-item .log-msg { color: var(--text-main); font-weight: 500; }
    .log-item .log-time { color: var(--text-sub); font-size: 12px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 빈 로그 */
    .log-empty {
      padding: 24px;
      text-align: center;
      color: var(--text-sub);
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">안심<span>벨</span></div>
  <div class="conn-badge">
    <div class="conn-dot" id="connDot"></div>
    <span id="connText">연결 중...</span>
  </div>
</header>

<main>

  <!-- 응급 배너 -->
  <div class="emergency-banner" id="emergencyBanner">
    🚨 응급 상황 — 즉시 확인 바랍니다!
  </div>

  <!-- 요약 -->
  <div class="summary">
    <div class="summary-item">
      <label>오늘 식사 확인</label>
      <div class="val normal" id="countVal">0/3</div>
    </div>
    <div class="summary-item">
      <label>현재 상태</label>
      <div class="val safe" id="overallStatus">안심</div>
    </div>
  </div>

  <!-- 식사 카드 3개 -->
  <div class="meal-card" id="card-아침 식사" data-meal="아침 식사">
    <div class="meal-info">
      <div class="meal-name">🌅 아침 식사</div>
      <div class="meal-time">07:00</div>
    </div>
    <div class="status-badge" id="badge-아침 식사">대기 중</div>
  </div>

  <div class="meal-card" id="card-점심 식사" data-meal="점심 식사">
    <div class="meal-info">
      <div class="meal-name">☀️ 점심 식사</div>
      <div class="meal-time">12:00</div>
    </div>
    <div class="status-badge" id="badge-점심 식사">대기 중</div>
  </div>

  <div class="meal-card" id="card-저녁 식사" data-meal="저녁 식사">
    <div class="meal-info">
      <div class="meal-name">🌙 저녁 식사</div>
      <div class="meal-time">17:00</div>
    </div>
    <div class="status-badge" id="badge-저녁 식사">대기 중</div>
  </div>

  <!-- 최근 기록 -->
  <div class="log-section">
    <h2>최근 기록</h2>
    <div class="log-list" id="logList">
      <div class="log-empty">아직 기록이 없어요</div>
    </div>
  </div>

</main>

<script>
  // ── Firebase 설정 ──────────────────────────────────────────────
  const firebaseConfig = {
    databaseURL: "https://bell-d3c5f-default-rtdb.firebaseio.com/"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // ── Telegram 설정 ──────────────────────────────────────────────
  const TG_TOKEN = "8835876527:AAHAARDx0On7NwuyQH5Z0V0awYXXNXickkU";
  const TG_CHAT_ID = "8660968341";

  function sendTelegram(msg) {
    fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msg, parse_mode: "HTML" })
    });
  }

  // ── 상태 관리 ──────────────────────────────────────────────────
  const meals = ["아침 식사", "점심 식사", "저녁 식사"];
  const prevStatus = {};   // 이전 상태 기억 (중복 텔레그램 방지)
  let doneCount = 0;
  let logs = [];

  function now() {
    return new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  function addLog(msg) {
    logs.unshift({ msg, time: now() });
    if (logs.length > 20) logs.pop();
    renderLog();
  }

  function renderLog() {
    const el = document.getElementById("logList");
    if (logs.length === 0) {
      el.innerHTML = '<div class="log-empty">아직 기록이 없어요</div>';
      return;
    }
    el.innerHTML = logs.map(l =>
      `<div class="log-item"><span class="log-msg">${l.msg}</span><span class="log-time">${l.time}</span></div>`
    ).join("");
  }

  function updateSummary() {
    doneCount = meals.filter(m => prevStatus[m] === "done").length;
    document.getElementById("countVal").textContent = `${doneCount}/3`;

    const hasTimeout = meals.some(m => prevStatus[m] === "timeout");
    const hasWaiting = meals.some(m => prevStatus[m] === "waiting");

    const statusEl = document.getElementById("overallStatus");
    const banner = document.getElementById("emergencyBanner");

    if (hasTimeout) {
      statusEl.textContent = "위험";
      statusEl.className = "val warn";
      banner.classList.add("show");
    } else if (hasWaiting) {
      statusEl.textContent = "확인 중";
      statusEl.className = "val";
      statusEl.style.color = "var(--waiting)";
      banner.classList.remove("show");
    } else {
      statusEl.textContent = "안심";
      statusEl.className = "val safe";
      statusEl.style.color = "";
      banner.classList.remove("show");
    }
  }

  function applyStatus(meal, status) {
    const card = document.getElementById(`card-${meal}`);
    const badge = document.getElementById(`badge-${meal}`);
    if (!card || !badge) return;

    card.className = "meal-card";
    badge.className = "status-badge";

    if (status === "waiting") {
      card.classList.add("status-waiting");
      badge.classList.add("waiting");
      badge.textContent = "⏳ 확인 요망";
    } else if (status === "done") {
      card.classList.add("status-done");
      badge.classList.add("done");
      badge.textContent = "✅ 확인 완료";
    } else if (status === "timeout") {
      card.classList.add("status-timeout");
      badge.classList.add("timeout");
      badge.textContent = "🚨 응급 확인!";
    } else {
      badge.textContent = "대기 중";
    }
  }

  // ── Firebase 실시간 감지 ───────────────────────────────────────
  meals.forEach(meal => {
    db.ref(`/${meal}`).on("value", snapshot => {
      const status = snapshot.val();
      if (!status) return;

      const prev = prevStatus[meal];
      prevStatus[meal] = status;

      applyStatus(meal, status);
      updateSummary();

      // 상태가 바뀔 때만 텔레그램 + 로그
      if (prev === status) return;

      if (status === "done") {
        const msg = `✅ <b>안부 확인 완료</b>\n\n어르신이 ${meal} 버튼을 눌렀습니다.\n시간: ${now()}`;
        sendTelegram(msg);
        addLog(`✅ ${meal} 안부 확인 완료`);
      } else if (status === "timeout") {
        const msg = `🚨 <b>응급 상황 — 즉시 확인 바랍니다!</b>\n\n${meal} 알람 후 5분간 응답이 없습니다.\n시간: ${now()}\n\n⚠️ 즉시 연락하세요!`;
        sendTelegram(msg);
        addLog(`🚨 ${meal} — 5분 무응답! 응급 확인 필요`);
      } else if (status === "waiting") {
        addLog(`🔔 ${meal} 알람 시작`);
      }
    });
  });

  // ── Firebase 연결 상태 ────────────────────────────────────────
  const connRef = db.ref(".info/connected");
  connRef.on("value", snap => {
    const dot = document.getElementById("connDot");
    const txt = document.getElementById("connText");
    if (snap.val()) {
      dot.classList.add("live");
      txt.textContent = "실시간 연결";
    } else {
      dot.classList.remove("live");
      txt.textContent = "연결 끊김";
    }
  });
</script>
</body>
</html>
