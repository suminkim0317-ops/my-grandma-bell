<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>생활 안심 현황</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">
  <div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-black text-gray-800">생활 안심 현황</h1>
      <span class="bg-blue-100 text-blue-800 px-4 py-1 rounded-full font-bold">실시간 연결</span>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <p class="text-gray-500 text-xs font-bold uppercase">오늘 식사 확인</p>
        <p id="total-count" class="text-3xl font-black text-gray-800">0/3</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <p class="text-gray-500 text-xs font-bold uppercase">현재 상태</p>
        <p class="text-3xl font-black text-green-500">안심</p>
      </div>
    </div>

    <div id="routine-list" class="space-y-3">
      <div class="text-center py-10 text-gray-400">데이터를 불러오는 중입니다...</div>
    </div>
  </div>

  <script>
    const firebaseConfig = { databaseURL: "https://bell-d3c5f-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const routineList = ['아침 식사', '점심 식사', '저녁 식사'];
    const times = ['07:00', '12:00', '18:00'];

    db.ref('/').on('value', (snapshot) => {
      const data = snapshot.val() || {};
      const listDiv = document.getElementById('routine-list');
      listDiv.innerHTML = '';
      
      let count = 0;

      routineList.forEach((name, index) => {
        const isDone = data[name] === 'done';
        if (isDone) count++;
        
        const statusText = isDone ? '확인 완료' : '확인 예정';
        const statusClass = isDone 
          ? 'bg-green-500 text-white' 
          : 'bg-gray-300 text-gray-600';

        listDiv.innerHTML += `
          <div class="bg-white p-6 rounded-3xl shadow-lg border border-gray-100 flex justify-between items-center">
            <div>
              <p class="text-xl font-bold text-gray-800">${name}</p>
              <p class="text-sm text-gray-400 font-bold">${times[index]}</p>
            </div>
            <div class="${statusClass} px-6 py-3 rounded-2xl font-black text-lg">
              ${statusText}
            </div>
          </div>
        `;
      });

      // 총 카운트 업데이트
      document.getElementById('total-count').innerText = `${count}/3`;
    });
  </script>
</body>
</html>
