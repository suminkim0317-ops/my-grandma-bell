<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할머니 안심 알림</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-50 p-4">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-4xl font-black text-gray-800 mb-8 text-center py-4 bg-white rounded-2xl shadow-sm border-2 border-blue-100">
      👵 할머니 오늘 루틴
    </h1>
    
    <div id="routine-list" class="space-y-4">
      <div class="text-center text-xl text-gray-500">로딩 중입니다...</div>
    </div>
  </div>

  <script>
    const firebaseConfig = { databaseURL: "https://bell-d3c5f-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const routineList = [
      { name: '아침 식사', time: '07:00' },
      { name: '점심 식사', time: '12:00' },
      { name: '저녁 식사', time: '18:00' }
    ];

    db.ref('/').on('value', (snapshot) => {
      const data = snapshot.val() || {};
      const listDiv = document.getElementById('routine-list');
      listDiv.innerHTML = '';
      
      const now = new Date();
      const currentHour = now.getHours();

      routineList.forEach(item => {
        const targetHour = parseInt(item.time.split(':')[0]);
        const isDone = data[item.name] === 'done';
        
        // 디자인 스타일링: 할머니께서 보기 좋게 크고 시원하게
        const statusText = isDone ? '확인 완료 ✅' : (currentHour >= targetHour ? '지금 해주세요! 🚨' : '대기 중...');
        const statusClass = isDone 
          ? 'bg-green-500 text-white shadow-md' 
          : (currentHour >= targetHour ? 'bg-red-500 text-white animate-pulse shadow-lg' : 'bg-gray-200 text-gray-600');

        listDiv.innerHTML += `
          <div class="bg-white p-6 rounded-3xl shadow-lg border border-gray-100 flex justify-between items-center">
            <div class="text-2xl font-bold text-gray-700">${item.name}<br><span class="text-sm text-gray-400">${item.time}</span></div>
            <div class="${statusClass} px-6 py-4 rounded-2xl font-black text-xl">${statusText}</div>
          </div>
        `;
      });
    });
  </script>
</body>
</html>
