<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할머니 안심 대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">
  <div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-black text-gray-800">👵 할머니 안심 현황</h1>
      <span class="bg-blue-100 text-blue-800 px-4 py-1 rounded-full font-bold">실시간 연결됨</span>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
        <p class="text-gray-500 text-xs font-bold">오늘 식사</p>
        <p class="text-2xl font-black text-gray-800">3/3</p>
      </div>
      <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
        <p class="text-gray-500 text-xs font-bold">오늘 활동</p>
        <p class="text-2xl font-black text-gray-800">완료</p>
      </div>
      <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
        <p class="text-gray-500 text-xs font-bold">약 복용</p>
        <p class="text-2xl font-black text-gray-800">정상</p>
      </div>
      <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
        <p class="text-gray-500 text-xs font-bold">현재 상태</p>
        <p class="text-2xl font-black text-green-500">안심</p>
      </div>
    </div>

    <div id="routine-list" class="space-y-3">
      <div class="text-center py-10 text-gray-400">데이터를 불러오는 중입니다...</div>
    </div>
  </div>

  <script>
    const firebaseConfig = { databaseURL: "https://bell-d3c5f-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const routineList = [
      { name: '아침 식사', time: '07:00' },
      { name: '점심 식사', time: '12:00' },
      { name: '저녁 식사', time: '18:00' }
    ];

    db.ref('/').on('value', (snapshot) => {
      const data = snapshot.val() || {};
      const listDiv = document.getElementById('routine-list');
      listDiv.innerHTML = '';
      
      routineList.forEach(item => {
        const isDone = data[item.name] === 'done';
        listDiv.innerHTML += `
          <div class="bg-white p-6 rounded-3xl shadow-lg border border-gray-100 flex justify-between items-center transition hover:shadow-xl">
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-500 font-bold text-xl">🕒</div>
              <div>
                <p class="text-xl font-bold text-gray-800">${item.name}</p>
                <p class="text-sm text-gray-400 font-bold">${item.time}</p>
              </div>
            </div>
            <div class="${isDone ? 'bg-green-500' : 'bg-orange-400'} text-white px-6 py-3 rounded-2xl font-black text-lg">
              ${isDone ? '확인 완료' : '확인 필요'}
            </div>
          </div>
        `;
      });
    });
  </script>
</body>
</html>
